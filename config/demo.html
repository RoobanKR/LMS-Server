<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untitled</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #111827;
      line-height: 1.7;
    }

    /* ── Full-page layout — no card ── */
    .page-wrap {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      padding: 56px 48px 100px;
    }

    /* ── Page title ── */
    .page-title {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #0f172a;
      line-height: 1.15;
      margin-bottom: 2.25rem;
    }

    /* ── Headings ── */
    .content h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 2rem 0 0.65rem;
      color: #111827;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }
    .content h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin: 1.75rem 0 0.5rem;
      color: #1f2937;
      line-height: 1.35;
    }
    .content h4 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 1.5rem 0 0.4rem;
      color: #374151;
    }

    /* ── Body text ── */
    .content p {
      font-size: 1rem;
      line-height: 1.85;
      color: #374151;
      margin-bottom: 1.1rem;
    }

    /* ── Blockquote ── */
    .content blockquote {
      border-left: 4px solid #6366f1;
      padding: 12px 0 12px 22px;
      color: #4b5563;
      font-style: italic;
      margin: 1.5rem 0;
      background: #f5f3ff;
      border-radius: 0 8px 8px 0;
    }

    /* ── Lists ── */
    .content ul, .content ol {
      padding-left: 1.75rem;
      margin: 0.75rem 0 1.1rem;
    }
    .content li {
      line-height: 1.8;
      color: #374151;
      margin-bottom: 0.35rem;
      font-size: 1rem;
    }

    /* ── Code ── */
    .content pre {
      background: #0f172a;
      color: #86efac;
      padding: 20px 24px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 1.5rem 0;
      font-family: 'Fira Code', 'Cascadia Code', 'Courier New', Consolas, monospace;
      font-size: 0.875rem;
      line-height: 1.7;
    }
    .content pre code { background: none; padding: 0; font-size: inherit; color: inherit; }

    /* ── Table ── */
    .content table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.5rem 0;
      font-size: 0.9375rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }
    .content th {
      background: #f9fafb;
      font-weight: 700;
      color: #374151;
      padding: 11px 16px;
      text-align: left;
      border-bottom: 2px solid #e5e7eb;
      font-size: 0.875rem;
    }
    .content td {
      padding: 10px 16px;
      border-bottom: 1px solid #f3f4f6;
      color: #374151;
      vertical-align: top;
    }
    .content tr:last-child td { border-bottom: none; }
    .content tbody tr:hover td { background: #fafafa; }

    /* ── Divider ── */
    .content hr {
      border: none;
      border-top: 1.5px solid #e5e7eb;
      margin: 2rem 0;
    }

    /* ── Images ── */
    .content figure { margin: 1.5rem 0; }
    .content img { max-width: 100%; border-radius: 8px; display: block; }
    .content figcaption {
      text-align: center;
      font-size: 0.82rem;
      color: #9ca3af;
      margin-top: 8px;
      font-style: italic;
    }

    /* ── Todo ── */
    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin: 6px 0;
      padding: 4px 0;
    }
    .todo-item input[type=checkbox] {
      margin-top: 4px;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      accent-color: #6366f1;
    }
    .todo-item span { font-size: 1rem; line-height: 1.7; color: #374151; }
    .todo-checked { text-decoration: line-through; color: #9ca3af; }

    /* ── Callout ── */
    .callout {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px 20px;
      border-radius: 10px;
      margin: 1.25rem 0;
    }
    .callout-icon { font-size: 1.25rem; flex-shrink: 0; margin-top: 2px; line-height: 1.5; }

    /* ── Video ── */
    .video-wrapper {
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      overflow: hidden;
      margin: 1.5rem 0;
    }
    .video-wrapper iframe { width: 100%; height: 100%; border: none; }

    /* ── Page link — inline button ── */
    .page-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #4f46e5;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      transition: background .15s, transform .1s, box-shadow .15s;
      margin: 8px 0;
      line-height: 1;
    }
    .page-link-btn:hover {
      background: #4338ca;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(79,70,229,.35);
    }
    .page-link-btn svg { flex-shrink: 0; }

    /* ── Multi-page nav bar ── */
    .page-nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1.5px solid #e5e7eb;
      gap: 12px;
    }
    .page-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1.5px solid #e5e7eb;
      background: #f9fafb;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      max-width: 220px;
      transition: background .15s, border-color .15s, box-shadow .15s;
    }
    .page-nav-btn span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .page-nav-btn:hover {
      background: #f3f4f6;
      border-color: #d1d5db;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    /* ── Page counter badge ── */
    .page-counter {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #9ca3af;
      background: #f3f4f6;
      padding: 4px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 2.25rem;
    }
    .page-header .page-title { margin: 0; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .page-wrap { padding: 32px 20px 60px; }
      .page-title { font-size: 1.9rem; }
      .content h2 { font-size: 1.35rem; }
      .content h3 { font-size: 1.15rem; }
      .content pre { padding: 14px 16px; font-size: 0.8125rem; }
      .content th, .content td { padding: 8px 10px; font-size: 0.8125rem; }
      .page-nav-btn { font-size: 12px; padding: 8px 12px; max-width: 145px; }
    }
  </style>
  </head>
  <body>
    <main class="page-wrap" id="pg-page-1772615597574-8gsq3" style="display:block">
      <div class="page-header">
        <h1 class="page-title">Untitled</h1>
        <span class="page-counter">1 / 2</span>
      </div>
      <div class="content">
        <p>dew</p>
<h4>dew</h4>
      </div>
      <div class="page-nav-row">
        <span></span>
        <button class="page-nav-btn" onclick="showPage('page-1772615603720-73n4m')" type="button">
              <span>Page 2</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
      </div>
    </main>
  <main class="page-wrap" id="pg-page-1772615603720-73n4m" style="display:none">
      <div class="page-header">
        <h1 class="page-title">Page 2</h1>
        <span class="page-counter">2 / 2</span>
      </div>
      <div class="content">
        <p>dsdse</p>
<h2>dewd</h2>
      </div>
      <div class="page-nav-row">
        <button class="page-nav-btn" onclick="showPage('page-1772615597574-8gsq3')" type="button">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
              <span>Untitled</span>
            </button>
        <span></span>
      </div>
    </main>
    <script>
      var PAGE_IDS = ["page-1772615597574-8gsq3","page-1772615603720-73n4m"];
      var currentId = 'page-1772615597574-8gsq3';
      function showPage(id) {
        PAGE_IDS.forEach(function(pid) {
          var el = document.getElementById('pg-' + pid);
          if (el) el.style.display = 'none';
        });
        var target = document.getElementById('pg-' + id);
        if (target) {
          target.style.display = 'block';
          currentId = id;
          window.scrollTo({ top: 0, behavior: 'smooth' });
          try { history.pushState({ pageId: id }, '', '#' + id); } catch(e) {}
        }
      }
      window.addEventListener('popstate', function(e) {
        var id = e.state && e.state.pageId ? e.state.pageId : location.hash.replace('#', '');
        if (id && PAGE_IDS.indexOf(id) !== -1) showPage(id);
      });
      (function() {
        var hash = location.hash.replace('#', '');
        if (hash && PAGE_IDS.indexOf(hash) !== -1) showPage(hash);
      })();
    </script>
  </body>
  </html>
